<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>포트폴리오 리스트</title>
    <!-- 구글 폰트 및 아이콘 추가 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #4e73df;
            --secondary-color: #858796;
            --success-color: #1cc88a;
            --info-color: #36b9cc;
            --admin-color: #e74a3b;
            --bg-color: #f8f9fc;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 40px 20px;
            color: #333;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 20px;
        }

        h2 {
            margin: 0;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .admin-badge {
            background-color: var(--admin-color);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7em;
            vertical-align: middle;
            text-transform: uppercase;
        }

        .btn-upload {
            background-color: var(--primary-color);
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-upload:hover {
            background-color: #2e59d9;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(78, 115, 223, 0.4);
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
        }

        th {
            background-color: #fcfcfc;
            color: var(--secondary-color);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            padding: 15px;
            border-bottom: 2px solid #edf0f5;
            text-align: left;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #edf0f5;
            vertical-align: middle;
        }

        tr:hover td {
            background-color: #fcfdff;
        }

        .file-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
            background: #f0f3ff;
            padding: 6px 12px;
            border-radius: 6px;
            transition: 0.2s;
        }

        .file-link:hover {
            background: var(--primary-color);
            color: white;
        }

        .author-info {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .author-icon {
            width: 30px;
            height: 30px;
            background: #e2e6ea;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8em;
            color: #6c757d;
        }

        .date-text {
            color: #a3a3a3;
            font-size: 0.9em;
        }

        .empty-state {
            text-align: center;
            padding: 50px 0;
            color: #ccc;
        }

        .empty-state i {
            font-size: 4rem;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-section">
        <h2>
            <i class="fas fa-folder-open" th:style="${isAdmin} ? 'color:var(--admin-color)' : 'color:var(--primary-color)'"></i>
            <span th:if="${isAdmin}">모든 포트폴리오 <span class="admin-badge">Admin Mode</span></span>
            <span th:unless="${isAdmin}">나의 포트폴리오</span>
        </h2>
        
        <div style="margin-bottom: 20px; text-align: right;">
    <!-- 메인으로 가기 버튼 (회색) -->
    <a th:href="@{/}" 
       style="padding: 10px 15px; background-color: #6c757d; color: white; text-decoration: none; border-radius: 5px; margin-right: 5px;">
       홈으로
    </a>
    
    <!-- 등록 페이지로 가기 버튼 (파란색) -->
    <a th:href="@{/portfolio/upload}" 
       style="padding: 10px 15px; background-color: #007bff; color: white; text-decoration: none; border-radius: 5px;">
       새 포트폴리오 등록
    </a>
</div>
        
     
    </div>

    <table>
        <thead>
            <tr>
                <th style="width: 80px;">No.</th>
                <th>프로젝트 제목</th>
                <th>작성자</th>
                <th>첨부파일</th>
                <th>등록일</th>
            </tr>
        </thead>
        <tbody>
            <!-- 데이터가 있을 때 -->
            <tr th:each="item, state : ${portfolios}">
                <td th:text="${item.id}" style="font-weight: bold; color: #888;">1</td>
                <td>
                    <span th:text="${item.title}" style="font-weight: 500; font-size: 1.05em;">포트폴리오 제목</span>
                </td>
                <td>
                    <div class="author-info">
                        <div class="author-icon"><i class="fas fa-user"></i></div>
                        <span th:text="${item.author.userid}">user01</span>
                    </div>
                </td>
                <td>
                    <a th:href="@{${item.filePath}}" class="file-link" target="_blank">
                        <i class="fas fa-file-download"></i>
                        <span th:text="${item.originName}">파일명.pdf</span>
                    </a>
                </td>
                <td>
                    <span class="date-text" th:text="${#temporals.format(item.createdAt, 'yyyy.MM.dd')}">2024.03.24</span>
                </td>
            </tr>

            <!-- 데이터가 없을 때 -->
            <tr th:if="${#lists.isEmpty(portfolios)}">
                <td colspan="5" class="empty-state">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <p>등록된 포트폴리오가 없습니다.<br>첫 번째 포트폴리오를 업로드해보세요!</p>
                </td>
            </tr>
        </tbody>
    </table>
</div>

</body>
</html>
