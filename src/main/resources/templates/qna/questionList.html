<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Q&A 게시판</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        .table thead { background-color: #f8f9fa; border-top: 2px solid #333; }
        .table-pinned { background-color: #fff9db; } /* 고정 질문 배경색 */
        .page-link { color: #333; }
        .page-item.active .page-link { background-color: #0d6efd; border-color: #0d6efd; }
    </style>
</head>
<body class="bg-light">

<div class="container my-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-primary"><i class="bi bi-chat-dots me-2"></i>Q&A 게시판</h2>
        <a th:href="@{/qna/question}" class="btn btn-primary px-4 shadow-sm">
            <i class="bi bi-pencil-square me-1"></i> 질문하기
        </a>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <table class="table table-hover mb-0 text-center">
                <thead>
                    <tr>
                        <th style="width: 80px;">번호</th>
                        <th class="text-start">제목</th>
                        <th style="width: 120px;">작성자</th>
                        <th style="width: 150px;">작성일</th>
                        <th style="width: 100px;">추천</th>
                        <th style="width: 100px;">조회</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- 1. 고정 질문 (Pinned Questions) 출력 영역 -->
                    <tr th:each="pinned : ${pinnedQuestions}" class="table-pinned">
                        <td><span class="badge bg-danger">고정</span></td>
                        <td class="text-start">
                            <a th:href="@{|/qna/detail/${pinned.id}|}" class="text-decoration-none text-dark fw-bold" th:text="${pinned.title}">고정 제목</a>
                            <span class="badge rounded-pill bg-white text-primary ms-1 border" 
                                  th:if="${#lists.size(pinned.answerList) > 0}" 
                                  th:text="${#lists.size(pinned.answerList)}"></span>
                        </td>
                        <td th:text="${pinned.isAnonymous == 'Y' ? '익명' : '작성자'}"></td>
                        <td class="text-muted small" th:text="${#temporals.format(pinned.createdAt, 'yyyy-MM-dd')}"></td>
                        <td><span class="badge bg-light text-dark" th:text="|👍 ${pinned.voteCount}|">0</span></td>
                        <td th:text="${pinned.viewCount}">0</td>
                    </tr>

                    <!-- 2. 일반 질문 (Paging) 출력 영역 -->
                    <tr th:each="question, loop : ${paging}">
                        <td th:text="${paging.totalElements - (paging.number * paging.size) - loop.index}"></td>
                        <td class="text-start">
                            <a th:href="@{|/qna/detail/${question.id}|}" class="text-decoration-none text-dark fw-semibold" th:text="${question.title}"></a>
                            <span class="badge rounded-pill bg-light text-primary ms-1 border" 
                                  th:if="${#lists.size(question.answerList) > 0}" 
                                  th:text="${#lists.size(question.answerList)}"></span>
                        </td>
                        <td th:text="${question.isAnonymous == 'Y' ? '익명' : '작성자'}"></td>
                        <td class="text-muted small" th:text="${#temporals.format(question.createdAt, 'yyyy-MM-dd')}"></td>
                        <td><span class="badge bg-light text-secondary" th:text="|👍 ${question.voteCount}|">0</span></td>
                        <td th:text="${question.viewCount}">0</td>
                    </tr>

                    <tr th:if="${paging.isEmpty() && (pinnedQuestions == null || pinnedQuestions.isEmpty())}">
                        <td colspan="6" class="py-5 text-muted">등록된 질문이 없습니다.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- 페이징 내비게이션 -->
    <nav th:if="${!paging.isEmpty()}" class="mt-5">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${paging.number == 0} ? 'disabled'">
                <a class="page-link" th:href="@{|?page=0|}"><i class="bi bi-chevron-double-left"></i></a>
            </li>
            <li class="page-item" th:classappend="${!paging.hasPrevious} ? 'disabled'">
                <a class="page-link" th:href="@{|?page=${paging.number-1}|}">이전</a>
            </li>
            <li th:each="page: ${#numbers.sequence(0, paging.totalPages-1)}"
                th:if="${page >= paging.number-2 and page <= paging.number+2}"
                th:classappend="${page == paging.number} ? 'active'" class="page-item">
                <a th:text="${page + 1}" class="page-link" th:href="@{|?page=${page}|}"></a>
            </li>
            <li class="page-item" th:classappend="${!paging.hasNext} ? 'disabled'">
                <a class="page-link" th:href="@{|?page=${paging.number+1}|}">다음</a>
            </li>
            <li class="page-item" th:classappend="${paging.number == paging.totalPages-1} ? 'disabled'">
                <a class="page-link" th:href="@{|?page=${paging.totalPages-1}|}"><i class="bi bi-chevron-double-right"></i></a>
            </li>
        </ul>
    </nav>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
