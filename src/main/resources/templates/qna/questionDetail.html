<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>질문 상세보기</title>
    <!-- 부트스트랩 CSS (CDN) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .question-content { min-height: 200px; white-space: pre-wrap; background-color: #f9f9f9; padding: 20px; border-radius: 10px; }
        .answer-card { border-left: 4px solid #0d6efd; margin-bottom: 20px; }
        .accepted-badge { background-color: #198754; color: white; padding: 3px 8px; border-radius: 5px; font-size: 0.8rem; }
    </style>
</head>
<body class="bg-light">

<div class="container my-5" style="max-width: 900px;">
    <!-- [1] 질문 영역 -->
    <div class="card shadow-sm mb-4">
        <div class="card-header bg-white py-3">
            <div class="d-flex justify-content-between align-items-start">
                <div>
                    <span th:if="${question.isPinned == 'Y'}" class="badge bg-danger mb-2">공지</span>
                    <h2 class="fw-bold" th:text="${question.title}">질문 제목이 나타납니다.</h2>
                </div>
                <div class="text-end text-muted small">
                    <div th:text="${#temporals.format(question.createdAt, 'yyyy-MM-dd HH:mm')}">2026-03-20</div>
                    <div>조회수: <span th:text="${question.viewCount}">0</span></div>
                </div>
            </div>
        </div>
        <div class="card-body">
            <!-- 질문 본문 (body) -->
            <div class="question-content" th:text="${question.body}">질문 내용이 여기에 출력됩니다.</div>
        </div>
        <div class="card-footer bg-white d-flex justify-content-between">
            <a th:href="@{/qna/list}" class="btn btn-outline-secondary">목록으로</a>
            <div>
                <button class="btn btn-outline-primary btn-sm">수정</button>
                <button class="btn btn-outline-danger btn-sm">삭제</button>
            </div>
        </div>
    </div>

    <!-- [2] 답변 목록 영역 -->
    <div class="mt-5 mb-3">
        <h4 class="fw-bold">답변 <span class="text-primary" th:text="${question.answerList != null ? question.answerList.size() : 0}">0</span></h4>
    </div>

    <!-- 답변 반복문 -->
    <div th:each="answer : ${question.answerList}" class="card answer-card shadow-sm">
        <div class="card-body">
            <div class="d-flex justify-content-between mb-2">
                <div>
                    <span class="fw-bold text-dark">익명 답변자</span>
                    <!-- 채택된 답변 표시 -->
                    <span th:if="${answer.isAccepted == 'Y'}" class="accepted-badge ms-2">채택됨</span>
                </div>
                <small class="text-muted" th:text="${#temporals.format(answer.createdAt, 'yyyy-MM-dd HH:mm')}">날짜</small>
            </div>
            
            <!-- 답변 본문 -->
            <div class="py-2" style="white-space: pre-wrap;" th:text="${answer.body}">답변 내용입니다.</div>
            
            <div class="mt-3 d-flex align-items-center small text-muted">
                <span class="me-3">추천 <span th:text="${answer.voteCount}">0</span></span>
                <span>댓글 <span th:text="${answer.commentCount}">0</span></span>
            </div>
        </div>
    </div>

    <!-- 답변이 없을 경우 -->
    <div th:if="${question.answerList == null or question.answerList.isEmpty()}" class="text-center py-5 bg-white rounded shadow-sm mb-4">
        <p class="text-muted mb-0">등록된 답변이 없습니다. 첫 번째 답변을 남겨보세요!</p>
    </div>

    <!-- [3] 답변 작성 폼 -->
    <div class="card shadow-sm mt-4 border-primary">
        <div class="card-header bg-primary text-white">
            <h5 class="mb-0">답변 남기기</h5>
        </div>
        <div class="card-body">
            <!-- th:action 경로 확인: Controller의 @PostMapping 주소와 일치해야 함 -->
            <form th:action="@{|/qna/answer/create/${question.id}|}" method="post">
                <div class="mb-3">
                    <textarea name="body" rows="4" class="form-control" placeholder="답변 내용을 상세히 적어주세요." required></textarea>
                </div>
                <div class="text-end">
                    <button type="submit" class="btn btn-primary px-4">답변 등록</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
