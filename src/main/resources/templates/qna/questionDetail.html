<!DOCTYPE html>
<!-- 1. 시큐리티 네임스페이스 추가 (sec: 태그 사용을 위해 필수!) -->
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>질문 상세보기</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .question-content { min-height: 200px; white-space: pre-wrap; background-color: #f9f9f9; padding: 20px; border-radius: 10px; }
        .answer-card { border-left: 4px solid #0d6efd; margin-bottom: 20px; }
        .accepted-badge { background-color: #198754; color: white; padding: 3px 8px; border-radius: 5px; font-size: 0.8rem; }
    </style>
</head>
<body class="bg-light">

<div class="container my-5" style="max-width: 900px;">
    <!-- [1] 질문 영역 -->
    <div class="card shadow-sm mb-4">
        <div class="card-header bg-white py-3">
            <div class="d-flex justify-content-between align-items-start">
                <div>
                    <span th:if="${question.isPinned == 'Y'}" class="badge bg-danger mb-2">공지</span>
                    <h2 class="fw-bold" th:text="${question.title}">질문 제목이 나타납니다.</h2>
                </div>
                <div class="text-end text-muted small">
                    <!-- 작성자 아이디 추가 표시 (누가 썼는지 확인용) -->
                    <div class="mb-1">작성자: <span th:text="${question.authorUserid}">작성자</span></div>
                    <div th:text="${#temporals.format(question.createdAt, 'yyyy-MM-dd HH:mm')}">2026-03-20</div>
                    <div>조회수: <span th:text="${question.viewCount}">0</span></div>
                </div>
            </div>
        </div>
        <div class="card-body">
            <div class="question-content" th:text="${question.body}">질문 내용이 여기에 출력됩니다.</div>
        </div>
        <div class="card-footer bg-white d-flex justify-content-between align-items-center">
            <a th:href="@{/qna/list}" class="btn btn-outline-secondary">목록으로</a>
            
            <!-- 2. 수정/삭제 버튼: 본인만 보이도록 수정 -->
            <div sec:authorize="isAuthenticated()" th:if="${#authentication.getPrincipal().getUsername() == question.authorUserid}">
                <!-- 컨트롤러의 @GetMapping("/modify/{id}") 주소와 맞춤 -->
                <a th:href="@{|/qna/modify/${question.id}|}" class="btn btn-outline-primary btn-sm">수정</a>
                
                <!-- 삭제는 클릭 시 한 번 물어보도록 자바스크립트 추가 -->
                <a href="javascript:void(0);" 
                   th:data-uri="@{|/qna/delete/${question.id}|}" 
                   class="delete btn btn-outline-danger btn-sm">삭제</a>
            </div>
        </div>
    </div>

         <!-- [2] 답변 목록 영역 -->
    <div class="mt-5 mb-3">
        <h4 class="fw-bold">답변 <span class="text-primary" th:text="${question.answerList != null ? question.answerList.size() : 0}">0</span></h4>
    </div>

    <!-- 답변 반복 시작 -->
    <div th:each="answer : ${question.answerList}" class="card answer-card shadow-sm mb-3">
        <div class="card-body">
            <div class="d-flex justify-content-between mb-2">
                <div>
                    <!-- 🔥 여기서 answer.authorUserid를 강제로 찍습니다 -->
                    <span class="fw-bold text-primary" style="font-size: 1.1rem;">
                        <i class="bi bi-person-circle"></i> 
                        작성자: <span th:text="${answer.authorUserid}">관리자아이디 미출력</span>
                    </span>
                    <span th:if="${answer.isAccepted == 'Y'}" class="accepted-badge ms-2">채택됨</span>
                </div>
                <!-- 날짜 부분 -->
                <small class="text-muted" th:text="${#temporals.format(answer.createdAt, 'yyyy-MM-dd HH:mm')}">2026-03-23</small>
            </div>
            
            <!-- 답변 본문 -->
            <div class="py-2" style="white-space: pre-wrap; color: #333;" th:text="${answer.body}">
                답변 내용이 여기에 출력됩니다.
            </div>
        </div>
    </div>

     <!-- [3] 답변 작성 폼: 관리자 전용 -->
    <div sec:authorize="hasRole('ROLE_ADMIN')" class="card shadow-sm mt-4 border-primary">
        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
            <h5 class="mb-0">답변 남기기</h5>
            <!-- 현재 로그인한 관리자 아이디를 미리 보여줌 -->
            <small class="badge bg-white text-primary" sec:authentication="name">admin_id</small>
        </div>
        <div class="card-body">
            <form th:action="@{|/qna/answer/create/${question.id}|}" method="post">
                <div class="mb-3">
                    <textarea name="body" rows="4" class="form-control" placeholder="답변 내용을 상세히 적어주세요." required></textarea>
                </div>
                <div class="text-end">
                    <button type="submit" class="btn btn-primary px-4">답변 등록</button>
                </div>
            </form>
        </div>
    </div>

    <div sec:authorize="!hasRole('ROLE_ADMIN')" class="text-center py-4 bg-white rounded shadow-sm mt-4">
        <p class="text-muted mb-0">답변은 관리자만 작성할 수 있습니다.</p>
    </div>
</div>

<!-- 3. 삭제 확인 스크립트 -->
<script type='text/javascript'>
const delete_elements = document.getElementsByClassName("delete");
Array.from(delete_elements).forEach(function(element) {
    element.addEventListener('click', function() {
        if(confirm("정말로 삭제하시겠습니까?")) {
            location.href = this.dataset.uri;
        };
    });
});
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
