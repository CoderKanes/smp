<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Q&A 질문 작성</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container my-5">
    <h2 class="border-bottom py-2" th:text="${questionDTO.id == null} ? '질문 등록' : '질문 수정'"></h2>
    
    <!-- 컨트롤러의 /qna/question POST 메서드로 데이터 전송 -->
    <form th:action="@{/qna/question}" th:object="${questionDTO}" method="post" class="mt-4">
        <!-- 수정 시 필수인 ID (hidden) -->
        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
            <label th:for="title" class="form-label font-weight-bold">제목</label>
            <input type="text" th:field="*{title}" class="form-control" placeholder="제목을 입력하세요" required>
        </div>

        <div class="mb-3">
            <label th:for="body" class="form-label font-weight-bold">내용</label>
            <textarea th:field="*{body}" class="form-control" rows="10" placeholder="내용을 상세히 입력해주세요" required></textarea>
        </div>

        <div class="mb-4 form-check">
            <input type="checkbox" th:field="*{isPinned}" th:value="Y" class="form-check-input" id="pinCheck">
            <label class="form-check-label" for="pinCheck">이 질문을 게시판 상단에 고정합니다.</label>
        </div>

        <div class="text-center">
            <button type="submit" class="btn btn-primary px-5" th:text="${questionDTO.id == null} ? '등록하기' : '수정완료'"></button>
            <a th:href="@{/qna/list}" class="btn btn-outline-secondary px-5">취소</a>
        </div>
    </form>
</div>
</body>
</html>
